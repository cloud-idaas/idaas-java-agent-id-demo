<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="https://47u4elcn.aliyunidaas.com/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Cloud IDaaS Agent ID Demo</title>
    <script src="https://cdn.hatter.ink/doc/8877_A6084D572902123F7BA051B7D46D1E0C/marked.min.js"></script>
    <script src="config.js"></script>
    <style>
        /* 页面整体样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 主容器 */
        #app-container {
            _max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        /* 标题栏 */
        #header {
            background-color: orange; /* 蓝色主题 */
            color: white;
            padding: 15px 20px;
            text-align: center;
            flex-shrink: 0; /* 不压缩高度 */
        }

        #header h1 {
            font-size: 1.5em;
            margin: 0;
        }

        /* 聊天消息容器 */
        #chat-messages {
            flex: 1; /* 占据剩余空间 */
            overflow-y: auto; /* 内容超出时可滚动 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* 消息之间的间距 */
        }

        /* 消息气泡样式 */
        .message {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.2s ease-out; /* 添加淡入动画 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 用户消息 */
        .message.user {
            align-self: flex-end; /* 靠右对齐 */
            background-color: #4a6cf7; /* 蓝色背景 */
            color: white;
            border-bottom-right-radius: 4px; /* 左侧圆角，右侧尖角 */
        }

        /* Agent 消息 (渲染 Markdown 后的内容) */
        .message.agent {
            align-self: flex-start; /* 靠左对齐 */
            background-color: #e5e5ea; /* 浅灰色背景 */
            color: black;
            border-bottom-left-radius: 4px; /* 右侧圆角，左侧尖角 */
            /* 为 Markdown 内容设置基本样式 */
        }
        .message.agent p { margin: 0.5em 0; }
        .message.agent h1, .message.agent h2, .message.agent h3 { margin: 0.5em 0 0.2em 0; }
        .message.agent ul, .message.agent ol { margin: 0.5em 0; padding-left: 1.5em; }
        .message.agent code { background-color: rgba(0,0,0,0.1); padding: 0.1em 0.3em; border-radius: 3px; font-family: monospace; }
        .message.agent pre { background-color: rgba(0,0,0,0.05); padding: 0.5em; overflow-x: auto; border-radius: 5px; }
        .message.agent pre code { background: none; padding: 0; }


        /* 加载提示 */
        .message.loading {
            background-color: #e5e5ea;
            color: #888;
            font-style: italic;
        }

        /* 输入区 */
        #input-container {
            display: flex;
            padding: 15px;
            background-color: #f0f2f5;
            border-top: 1px solid #ddd;
            flex-shrink: 0; /* 不压缩高度 */
        }

        #userInput {
            flex: 1; /* 占据输入区剩余宽度 */
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 20px; /* 圆角输入框 */
            font-size: 1em;
            outline: none;
            transition: border-color 0.2s;
        }

        #userInput:focus {
            border-color: orange; /* 聚焦时边框变蓝 */
            box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.2); /* 添加发光效果 */
        }

        #sendButton {
            margin-left: 10px;
            padding: 12px 20px;
            background-color: orange; /* 蓝色按钮 */
            color: white;
            border: none;
            border-radius: 20px; /* 圆角按钮 */
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.2s;
        }

        #sendButton:hover {
            background-color: orange; /* 悬停时颜色加深 */
        }

        #sendButton:disabled {
            background-color: #cccccc; /* 禁用时颜色变灰 */
            cursor: not-allowed;
        }

        /* 错误消息样式 */
        .message.error {
            background-color: #ffebee;
            color: #c62828;
            align-self: stretch; /* 拉伸占满整行 */
            text-align: center;
        }

    </style>
</head>
<body>

<div id="app-container">
    <div id="header">
        <h1>Alibaba Cloud IDaaS Agent ID Demo</h1>
    </div>

    <div id="chat-messages">
        <!-- 欢迎消息 -->
        <div class="message agent">
            你好！我是由 AgentScope 驱动的 AI Agent。请在下方输入框中提出你的问题或指令。
            <b>不过，你需要使用 Alibaba Cloud IDaaS 登录才可以用哦～</b><span id="loginWithIdaas"></span>
        </div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="输入消息..." autocomplete="off"/>
        <button id="sendButton" onclick="sendMessage()">发送</button>
    </div>
</div>

<script>
    const AGENTSCOPE_API_URL = window.APP_CONFIG.AGENTSCOPE_API_URL;

    // 获取 DOM 元素
    const chatMessagesDiv = document.getElementById('chat-messages');
    const userInputElement = document.getElementById('userInput');
    const sendButtonElement = document.getElementById('sendButton');

    function initClient() {
        window.accessToken = getAccessTokenFromHash();
        if (!window.accessToken) {
            document.getElementById('loginWithIdaas').innerHTML = '&nbsp; <a href="#" onclick="doLogin()">前往 Alibaba Cloud IDaaS 登录[...]</a>';
        } else {
            const payload = window.accessToken.split('.')[1];
            window.userId = JSON.parse(atob(payload)).sub;
            window.sessionId = JSON.parse(atob(payload)).jti;
        }
    }
    initClient();

    function getAccessTokenFromHash() {
        if (!location.hash) {
            return null;
        }
        console.log(location.hash);
        const hash = location.hash;
        location.hash = '';
        if (hash.startsWith('#')) {
            const searchParams = new URLSearchParams(hash.slice(1));
            const params = {};
            for (const [key, value] of searchParams) {
                params[key] = value;
            }
            window.tokenResponse = params;
            return params['access_token'];
        }
        return {};
    }

    function getMyUrl() {
        const url = location.href;
        const indexOfQ = url.indexOf('?');
        const indexOfH = url.indexOf('#');
        if (indexOfQ < 0 && indexOfH < 0) {
            return url;
        }
        if (indexOfQ > 0 && indexOfH > 0) {
        return url.substring(0, Math.min(indexOfQ, indexOfH));
        }
        return url.substring(0, (indexOfQ < 0) ? indexOfH: indexOfQ);
    }

    function doLogin() {
        const clientId = encodeURIComponent(window.APP_CONFIG.CLIENT_ID);
        const callbackUri = encodeURIComponent(getMyUrl());
        const scope = encodeURIComponent(window.APP_CONFIG.SCOPE);
        location.href = `${window.APP_CONFIG.IDAAS_AUTHORIZE_ENDPOINT}?client_id=${clientId}&response_type=token&scope=${scope}&redirect_uri=${callbackUri}`;
    }

    // 辅助函数：滚动到底部
    function scrollToBottom() {
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    // 辅助函数：加消息到聊天窗口
    function addMessage(content, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        if (sender === 'user') {
            messageDiv.classList.add('user');
            messageDiv.textContent = content; // 用户消息通常是纯文本
        } else if (sender === 'agent') {
            messageDiv.classList.add('agent');
            // Agent 消息需要渲染 Markdown
            messageDiv.innerHTML = marked.parse(content || ""); // 初始化时可能为空
        } else if (sender === 'error') {
            messageDiv.classList.add('error');
            messageDiv.textContent = content;
        } else if (sender === 'loading') {
            messageDiv.classList.add('loading');
            messageDiv.textContent = content;
        }
        chatMessagesDiv.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv; // 返回元素引用以便后续更新内容
    }

    // 发送消息的主函数
    async function sendMessage() {
        const prompt = userInputElement.value.trim();
        if (!prompt) {
            return;
        }

        // 1. 显示用户输入的消息
        addMessage(prompt, 'user');
        userInputElement.value = ''; // 清空输入框
        sendButtonElement.disabled = true; // 禁用发送按钮

        // 2. 创建一个空白的 Agent 消息气泡用于显示流式内容
        const agentMessageElement = addMessage('', 'agent'); // 初始内容为空
        let fullAgentResponse = ""; // 用于累积完整的响应内容
        let currentLine = ""; // 当前正在处理的内容行

        // 防抖函数，避免过于频繁地更新 DOM 和渲染 Markdown
        let renderTimeout;
        function debouncedRender() {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                // 每次更新时，将累积的完整文本解析为 HTML 并插入到消息气泡中
                agentMessageElement.innerHTML = marked.parse(fullAgentResponse);
                scrollToBottom();
            }, 16); // 约 60fps 的延迟
        }
        
        // 立即渲染函数（用于首次内容）
        function immediateRender() {
            agentMessageElement.innerHTML = marked.parse(fullAgentResponse);
            scrollToBottom();
        }

        try {
            // 3. 构建并发送请求到 AgentScope 后端
            const requestBody = {
                messages: [
                    {
                        role: 'user',
                        content: prompt
                    }
                ],
                model: 'qwen-plus',
                stream: true
            };

            const response = await fetch(AGENTSCOPE_API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    // TODO use SSO
                    'Authorization': 'Bearer ' + window.accessToken,
                },
                body: JSON.stringify(requestBody),
            });

            if (!response.ok) {
                if (response.status === 401) {
                    addMessage('⚠️ 哎呀，你没有登录或登录已经过期，请重新通过 Alibaba Cloud IDaaS 登录哦～', 'error');
                    return;
                }
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            // 4. 处理流式响应（SSE 格式）
            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = ''; // 用于缓存不完整的行
            let messageCount = 0; // 计数器
            let receivedAnyContent = false; // 标记是否收到有效内容
            
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
            
                const chunk = decoder.decode(value, { stream: true });
            
                buffer += chunk; // 添加到缓冲区
            
                // 按行分割 SSE 数据
                const lines = buffer.split('\n');
                buffer = lines.pop() || ''; // 保留最后一个可能不完整的行
            
                for (const line of lines) {
                    const trimmedLine = line.trim();
            
                    // 跳过空行（SSE 标准格式中用空行分隔事件）
                    if (trimmedLine === '') {
                        continue;
                    }
            
                    // 检查是否是 SSE data 行
                    if (trimmedLine.startsWith('data:')) {
                        // 移除 "data:" 前缀（包括可能的空格）
                        let data = trimmedLine.slice(5).trim();
            
                        if (data === '[DONE]') {
                            continue; // 结束标志
                        }
            
                        try {
                            const parsed = JSON.parse(data);
                            messageCount++;
                                                                    
                            // 从响应中提取文本内容并追加到完整响应中
                            // 兼容多种可能的响应格式
                            const choice = parsed.choices?.[0];
                            const content = choice?.delta?.content || choice?.message?.content || '';
                                        
                            if (content) {
                                fullAgentResponse += content; // 累积内容
                                receivedAnyContent = true;
                                                                
                                // 如果是第一条内容，立即渲染，否则使用防抖
                                if (messageCount === 1) {
                                    immediateRender();
                                } else {
                                    debouncedRender(); // 触发防抖渲染
                                }
                            }
                        } catch (e) {
                            console.error("[DEBUG] 解析 JSON 失败:", e.message, "原始数据:", data);
                        }
                    } else if (!trimmedLine.startsWith(':')) {
                        // 非注释行
                        console.warn('[DEBUG] 发现非 data: 行:', trimmedLine);
                    }
                }
            }

            console.log('[DEBUG] SSE 流读取完成，共收到', messageCount, '条消息');
            if (!receivedAnyContent) {
                console.warn('[DEBUG] 警告：未收到任何有效内容！');
            }

        } catch (error) {
            console.error("发送消息失败:", error);
            addMessage(`请求失败：${error.message}`, 'error');
        } finally {
            // 5. 恢复发送按钮
            sendButtonElement.disabled = false;
        }
    }

    // 监听回车键发送消息
    userInputElement.addEventListener('keypress', (event) => {
        if (event.key === 'Enter' && !sendButtonElement.disabled) {
            sendMessage();
        }
    });
</script>
</body>
</html>
